name: Build Binary

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
          - os: macos-latest
            platform: darwin-arm64
          - os: windows-latest
            platform: windows-amd64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==6.11.1
          pip install -r requirements.txt

      - name: Verify fast help stays in sync
        run: python -m unittest tests.test_fast_help_consistency

      - name: Build binary
        run: python build.py

      - name: Smoke test (Linux/macOS)
        if: runner.os != 'Windows'
        run: dist/iact3 --version

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: dist/iact3.exe --version

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: iact3-binary-${{ matrix.platform }}
          path: dist/iact3-*

      - name: Upload version file
        if: matrix.platform == 'linux-amd64'
        uses: actions/upload-artifact@v4
        with:
          name: iact3-version
          path: dist/version.txt

  upload-assets:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            artifacts/iact3-binary-*/* \
            artifacts/iact3-version/version.txt \
            --clobber
